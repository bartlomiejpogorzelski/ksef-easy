locales: &locales
  # This is the canonical list of available languages.
  en: English
  pl: Polski
  # ja: 日本語

# The language labels should be the same across all locales.
en:
  locale:
    default: Default
    locales: *locales
pl:
  locale:
    default: Default
    locales: *locales

ja:
  locale:
    default: デフォルト
    locales: *locales
